databases:
  - name: nrms-db
    plan: free
    databaseName: nrms
    user: nrms

services:
  - type: web
    name: nrms
    plan: free
    runtime: node
    buildCommand: |
      cd packages/frontend && npm install --include=dev && npm run build &&
      cd ../../packages/backend && npm install --include=dev && npx prisma generate && npm run build &&
      cp -r ../frontend/dist ./public
    startCommand: cd packages/backend && npx prisma migrate deploy && npx ts-node prisma/seed-if-empty.ts && node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nrms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 24h
      - key: NODE_ENV
        value: production
      - key: STORAGE_PATH
        value: /tmp/uploads
