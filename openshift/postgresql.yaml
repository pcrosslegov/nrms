apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  labels:
    app: nrms
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nrms
      component: database
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nrms
        component: database
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: nrms
            - name: POSTGRES_USER
              value: nrms
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nrms-secrets
                  key: db-password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "nrms"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: nrms-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  labels:
    app: nrms
    component: database
spec:
  selector:
    app: nrms
    component: database
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nrms-pgdata
  labels:
    app: nrms
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
